project:
  name: songo-model-stockfish-for-google-collab
runtime:
  device: cuda
  seed: 42
storage:
  drive_root: /content/drive/MyDrive/songo-stockfish
  repo_root: /content/songo-model-stockfish-for-google-collab
job:
  run_type: benchmark
  job_id: auto
  resume: true
  save_every_minutes: 5
benchmark:
  target: songo_policy_value_colab_pro_v2
  checkpoint_path: models/final/songo_policy_value_colab_pro_v2.pt
  matchups:
  - minimax:medium
  - minimax:hard
  - mcts:medium
  - mcts:hard
  games_per_matchup: 50
  alternate_first_player: true
  max_moves: 400
  output_dir: reports/benchmarks
