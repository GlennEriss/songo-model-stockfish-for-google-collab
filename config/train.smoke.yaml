project:
  name: songo-model-stockfish-for-google-collab

runtime:
  device: cpu
  seed: 42
  num_workers: 1

storage:
  drive_root: /content/drive/MyDrive/songo-stockfish
  repo_root: /content/songo-model-stockfish-for-google-collab

job:
  run_type: train
  job_id: auto
  resume: true
  save_every_minutes: 5

train:
  dataset_id: dataset_v1_smoke_10
  dataset_path: data/datasets/dataset_v1_smoke_10/train.npz
  validation_path: data/datasets/dataset_v1_smoke_10/validation.npz
  model_family: policy_value
  backbone: mlp
  hidden_sizes: [256, 256, 128]
  batch_size: 10
  epochs: 1
  learning_rate: 0.0003
  value_loss_weight: 1.0
  checkpoint_dir: models/checkpoints
  final_dir: models/final
  model_id: songo_policy_value_smoke_10
