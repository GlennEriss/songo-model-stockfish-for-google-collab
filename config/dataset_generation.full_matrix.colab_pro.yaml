project:
  name: songo-model-stockfish-for-google-collab

runtime:
  seed: 42
  num_workers: 16
  multiprocessing_start_method: spawn
  max_tasks_per_child: 25

storage:
  drive_root: /content/drive/MyDrive/songo-stockfish
  repo_root: /content/songo-model-stockfish-for-google-collab

job:
  run_type: dataset_generation
  job_id: auto
  resume: true
  save_every_minutes: 5
  auto_rollover_completed_job: true

dataset_generation:
  source_mode: benchmatch
  self_play_model: auto_best
  self_play_model_device: cpu
  self_play_num_simulations: 96
  self_play_c_puct: 1.5
  self_play_temperature: 1.0
  self_play_temperature_end: 0.1
  self_play_temperature_drop_ply: 12
  self_play_root_dirichlet_alpha: 0.3
  self_play_root_dirichlet_epsilon: 0.25
  self_play_deterministic: false
  dataset_source_id: sampled_full_matrix_colab_pro
  source_dataset_id: ""
  source_dataset_ids: []
  derivation_strategy: unique_positions
  merge_dedupe_sample_ids: true
  derivation_params:
    endgame_max_board_seeds: 24
    high_branching_min_legal_moves: 4
    include_original_samples: true
    max_depth: 2
    max_branching: 3
    max_generated_per_source_sample: 8
  matchups:
    - minimax:medium vs minimax:medium
    - minimax:medium vs minimax:hard
    - minimax:hard vs minimax:medium
    - minimax:hard vs minimax:hard
    - mcts:medium vs mcts:medium
    - mcts:medium vs mcts:hard
    - mcts:hard vs mcts:medium
    - mcts:hard vs mcts:hard
    - minimax:medium vs mcts:medium
    - minimax:medium vs mcts:hard
    - minimax:hard vs mcts:medium
    - minimax:hard vs mcts:hard
    - mcts:medium vs minimax:medium
    - mcts:medium vs minimax:hard
    - mcts:hard vs minimax:medium
    - mcts:hard vs minimax:hard
  games: 400
  target_samples: 1000000
  sample_strategy: uniform_by_ply
  sample_every_n_plies: 2
  max_moves: 400
  model_agent_device: cpu
  max_pending_futures: 16
  progress_update_every_n_games: 1
  output_raw_dir: data/raw_full_matrix_colab_pro
  output_sampled_dir: data/sampled_full_matrix_colab_pro
  # Benchmark review mini-dataset enrichment (hard examples)
  benchmark_review_enabled: false
  benchmark_review_model: auto_best
  benchmark_review_summary_path: ""
  benchmark_review_top_k: 2
  benchmark_review_repeat_factor: 2
  benchmark_review_max_winrate: 0.35
  benchmark_review_max_added_matchups: 12
  benchmark_review_supported_only: true
  # Tournament inter-models review mini-dataset enrichment
  tournament_review_enabled: true
  tournament_review_focus_model: auto_tournament_winner  # auto_tournament_winner | auto_best | auto_latest | <model_id>
  tournament_review_summary_path: ""  # vide => dernier rapport reports/benchmarks/model_tournaments/model_tournament_*.json
  tournament_review_top_k: 4
  tournament_review_repeat_factor: 2
  tournament_review_max_score_rate: 0.55
  tournament_review_max_added_matchups: 12
  tournament_review_include_reverse_matchup: true
