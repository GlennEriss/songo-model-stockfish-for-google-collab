project:
  name: songo-model-stockfish-for-google-collab

runtime:
  device: cuda
  seed: 42
  num_workers: 4
  pin_memory: true
  persistent_workers: true
  prefetch_factor: 4
  mixed_precision: true

storage:
  drive_root: /content/drive/MyDrive/songo-stockfish
  repo_root: /content/songo-model-stockfish-for-google-collab

job:
  run_type: evaluation
  job_id: auto
  resume: true
  save_every_minutes: 5

evaluation:
  model_id: auto_latest
  checkpoint_path: ""
  dataset_selection_mode: largest_built
  dataset_id: auto
  test_dataset_path: ""
  batch_size: 8192
  log_every_n_batches: 5
  output_dir: reports/evaluations
