project:
  name: songo-model-stockfish-for-google-collab

storage:
  drive_root: /content/drive/MyDrive/songo-stockfish
  repo_root: /content/songo-model-stockfish-for-google-collab

job:
  run_type: dataset_build
  job_id: auto
  resume: true
  save_every_minutes: 5

dataset_build:
  input_sampled_dir: data/sampled_colab_pro
  dataset_id: dataset_v1_colab_pro
  output_dir: data/datasets/dataset_v1_colab_pro
  teacher:
    engine: minimax
    level: hard
  split:
    train: 0.8
    validation: 0.1
    test: 0.1
