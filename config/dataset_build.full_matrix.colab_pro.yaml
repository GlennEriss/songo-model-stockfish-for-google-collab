project:
  name: songo-model-stockfish-for-google-collab

storage:
  drive_root: /content/drive/MyDrive/songo-stockfish
  repo_root: /content/songo-model-stockfish-for-google-collab

job:
  run_type: dataset_build
  job_id: auto
  resume: true
  save_every_minutes: 5
  auto_rollover_completed_job: true

dataset_build:
  input_sampled_dir: data/sampled_full_matrix_colab_pro
  dataset_id: dataset_v2_full_matrix_colab_pro_insane_1m
  output_dir: data/datasets/dataset_v2_full_matrix_colab_pro_insane_1m
  label_cache_dir: data/label_cache/dataset_v2_full_matrix_colab_pro_insane_1m
  target_labeled_samples: 1000000
  num_workers: 12
  max_pending_futures: 24
  teacher:
    engine: minimax
    level: insane
  log_every_n_files: 25
  split:
    train: 0.8
    validation: 0.1
    test: 0.1
